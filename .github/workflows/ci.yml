# =============================================================================
# Cortex CI Pipeline
# Triggered on pull requests to main.
# Jobs: frontend-lint, frontend-test, backend-lint, backend-test
# =============================================================================

name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  # ── Frontend Lint ────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting (Prettier)
        run: npx prettier --check src

      - name: Type check (tsc)
        run: npx tsc --noEmit

  # ── Frontend Tests ───────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: frontend/coverage/

  # ── Backend Lint (placeholder) ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run backend lint (placeholder)
        run: echo "Backend lint — backend team fills this in"

  # ── Backend Tests (placeholder) ──────────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cortex_test
          POSTGRES_USER: cortex
          POSTGRES_PASSWORD: cortex_test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run backend tests (placeholder)
        run: echo "Backend tests — backend team fills this in"
        env:
          DATABASE_URL: postgresql://cortex:cortex_test_secret@localhost:5432/cortex_test
          REDIS_URL: redis://localhost:6379/0
