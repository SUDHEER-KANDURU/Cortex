# =============================================================================
# Release Workflow — Triggered on version tags (v*.*.*)
# Builds and tags Docker images for all services.
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Build & Tag Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/docker/frontend.Dockerfile
          push: false
          tags: cortex-frontend:${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ steps.version.outputs.VERSION }}
